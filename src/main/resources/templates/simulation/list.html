<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title>시뮬레이션 목록</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">시뮬레이션 목록</h4>
        <div class="d-flex gap-2">
            <button id="btnExport" class="btn btn-success" disabled onclick="exportSelected()">엑셀 Export</button>
            <a href="/simulations/new" class="btn btn-primary">+ 새 시뮬레이션</a>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th><input type="checkbox" id="checkAll" title="전체 선택"></th>
                        <th>ID</th>
                        <th>이름</th>
                        <th>락 전략</th>
                        <th>스레드</th>
                        <th>관객 분포</th>
                        <th>상태</th>
                        <th>시작</th>
                        <th>종료</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(simulations)}">
                        <td colspan="10" class="text-center text-muted py-4">등록된 시뮬레이션이 없습니다.</td>
                    </tr>
                    <tr th:each="sim : ${simulations}"
                        th:onclick="|location.href='/simulations/${sim.id}/run'|">
                        <td onclick="event.stopPropagation()">
                            <input type="checkbox" class="sim-checkbox" th:value="${sim.id}" onchange="updateExportBtn()">
                        </td>
                        <td th:text="${sim.id}"></td>
                        <td th:text="${sim.name}"></td>
                        <td>
                            <span th:text="${sim.lockStrategy}"
                                  th:classappend="${sim.lockStrategy.name() == 'PESSIMISTIC'    ? 'bg-primary' :
                                                   sim.lockStrategy.name() == 'OPTIMISTIC'     ? 'bg-success' :
                                                                                                  'bg-danger'}"
                                  class="badge"></span>
                        </td>
                        <td>
                            <span th:if="${sim.virtualThread}"
                                  class="badge bg-info text-dark">Virtual</span>
                            <span th:unless="${sim.virtualThread}"
                                  class="badge bg-secondary">Platform</span>
                        </td>
                        <td th:text="${sim.audienceDistributionStrategy}"></td>
                        <td>
                            <span th:text="${sim.status}"
                                  th:classappend="${sim.status.name() == 'READY'   ? 'bg-secondary' :
                                                   sim.status.name() == 'RUNNING' ? 'bg-warning text-dark' :
                                                   sim.status.name() == 'DONE'    ? 'bg-success' :
                                                                                     'bg-danger'}"
                                  class="badge"></span>
                        </td>
                        <td th:text="${sim.startedAt != null ? #temporals.format(sim.startedAt, 'MM-dd HH:mm:ss') : '-'}"></td>
                        <td th:text="${sim.finishedAt != null ? #temporals.format(sim.finishedAt, 'MM-dd HH:mm:ss') : '-'}"></td>
                        <td>
                            <a th:href="|/simulations/${sim.id}/run|"
                               class="btn btn-sm btn-outline-secondary"
                               onclick="event.stopPropagation()">
                                상세
                            </a>
                            <button th:if="${sim.status.name() == 'RUNNING'}"
                                    class="btn btn-sm btn-outline-danger ms-1"
                                    th:onclick="|event.stopPropagation(); interruptSimulation(${sim.id})|">
                                중지
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
    function interruptSimulation(id) {
        if (!confirm('시뮬레이션을 중지하시겠습니까?')) return;
        fetch('/api/simulations/' + id + '/interrupt', { method: 'POST' })
            .then(() => location.reload())
            .catch(err => alert('중지 요청 실패: ' + err));
    }

    document.getElementById('checkAll').addEventListener('change', function () {
        document.querySelectorAll('.sim-checkbox').forEach(cb => cb.checked = this.checked);
        updateExportBtn();
    });

    function updateExportBtn() {
        const any = document.querySelectorAll('.sim-checkbox:checked').length > 0;
        document.getElementById('btnExport').disabled = !any;
        // checkAll 상태 동기화
        const all = document.querySelectorAll('.sim-checkbox');
        const checked = document.querySelectorAll('.sim-checkbox:checked');
        document.getElementById('checkAll').indeterminate = checked.length > 0 && checked.length < all.length;
        document.getElementById('checkAll').checked = all.length > 0 && checked.length === all.length;
    }

    function exportSelected() {
        const ids = [...document.querySelectorAll('.sim-checkbox:checked')].map(cb => cb.value);
        if (ids.length === 0) return;
        const params = ids.map(id => 'ids=' + id).join('&');
        window.location.href = '/api/simulations/export?' + params;
    }
    </script>
</div>
</body>
</html>
