<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title>공연 목록</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">공연 목록</h4>
        <div class="d-flex gap-2">
            <a href="/shows/new" class="btn btn-primary">+ 공연 등록</a>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>공연명</th>
                        <th>행 수</th>
                        <th>열 수</th>
                        <th>총 좌석 수</th>
                        <th>관객 수</th>
                        <th>좌석 전략</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(shows)}">
                        <td colspan="7" class="text-center text-muted py-4">등록된 공연이 없습니다.</td>
                    </tr>
                    <tr th:each="show : ${shows}"
                        th:onclick="|location.href='/shows/${show.id}'|">
                        <td th:text="${show.id}"></td>
                        <td th:text="${show.name}"></td>
                        <td th:text="${show.maxRow}"></td>
                        <td th:text="${show.maxCol}"></td>
                        <td th:text="${show.maxRow * show.maxCol}"></td>
                        <td th:text="${show.audienceCount}"></td>
                        <td>
                            <span th:text="${show.seatSettingStrategy}"
                                  class="badge bg-secondary"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
