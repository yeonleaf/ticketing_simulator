<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title>공연 등록</title></head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">공연 등록</h5>
                </div>
                <div class="card-body">
                    <form id="showForm">
                        <div class="mb-3">
                            <label class="form-label">공연명</label>
                            <input type="text" id="name" class="form-control" required placeholder="예) 레미제라블">
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">행 수 (maxRow)</label>
                                <input type="number" id="maxRow" class="form-control" min="1" value="10" required>
                            </div>
                            <div class="col">
                                <label class="form-label">열 수 (maxCol)</label>
                                <input type="number" id="maxCol" class="form-control" min="1" value="10" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="alert alert-info py-2 mb-0">
                                총 좌석 수: <strong id="totalSeats">100</strong>개
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">관객 수 (audienceCount)</label>
                            <input type="number" id="audienceCount" class="form-control" min="1" value="200" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">좌석 전략</label>
                            <select id="seatSettingStrategy" class="form-select" required>
                                <option value="MUSICAL_STANDARD">MUSICAL_STANDARD – 뮤지컬 기본 (앞줄+중앙 선호)</option>
                                <option value="CONCERT_FRONT">CONCERT_FRONT – 콘서트 앞줄 집중</option>
                                <option value="UNIFORM">UNIFORM – 균등 분포</option>
                            </select>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-fill">등록</button>
                            <a href="/shows" class="btn btn-outline-secondary flex-fill">취소</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

<script th:inline="none">
    const maxRowEl = document.getElementById('maxRow');
    const maxColEl = document.getElementById('maxCol');
    const totalSeatsEl = document.getElementById('totalSeats');
    const audienceCountEl = document.getElementById('audienceCount');

    function updateTotalSeats() {
        const total = (parseInt(maxRowEl.value) || 0) * (parseInt(maxColEl.value) || 0);
        totalSeatsEl.textContent = total;
    }

    maxRowEl.addEventListener('input', updateTotalSeats);
    maxColEl.addEventListener('input', updateTotalSeats);
    updateTotalSeats();

    document.getElementById('showForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = {
            name: document.getElementById('name').value,
            maxRow: parseInt(maxRowEl.value),
            maxCol: parseInt(maxColEl.value),
            audienceCount: parseInt(audienceCountEl.value),
            seatHoldingTimeSeconds: 0,
            seatSettingStrategy: document.getElementById('seatSettingStrategy').value
        };
        try {
            const res = await fetch('/api/shows', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error(await res.text());
            location.href = '/shows';
        } catch (err) {
            alert('공연 등록 실패: ' + err.message);
        }
    });
</script>
</div>
</body>
</html>
